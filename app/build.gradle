def sha256ForFile = { File file ->
    MessageDigest digest = MessageDigest.getInstance("SHA-256")
    file.withInputStream { input ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = input.read(buffer)) != -1) {
            digest.update(buffer, 0, read)
        }
    }
    digest.digest().collect { String.format("%02x", it) }.join()
}

def isPandocAvailable() {
    try {
        def process = "pandoc --version".execute()
        process.waitForProcessOutput()
        return process.exitValue() == 0
    } catch (Exception e) {
        return false
    }
}

def resolveOutputDirectory = { String taskName, String propertyName ->
    def task = tasks.findByName(taskName)
    if (task == null || !task.hasProperty(propertyName)) {
        throw new GradleException("Task '${taskName}' is unavailable or does not expose '${propertyName}'")
    }
    task."${propertyName}".get().asFile
}

def pandocTask(variantName, filename, title){
    def processTaskName = "process${variantName}Resources"
    def mergeTaskName = "merge${variantName}Assets"
    def src = file("../${filename}")

    if (isPandocAvailable()) {
        def pandocTaskName = "pandoc${variantName}${filename}"
        tasks.register(pandocTaskName, Exec) {
            dependsOn mergeTaskName
            inputs.file src
            doNotTrackState("Output directory is dynamic")
            executable = 'pandoc'
            doFirst {
                def outputDir = resolveOutputDirectory(mergeTaskName, "outputDir")
                def dest = file("${outputDir}/${filename}")
                args=[
                        '--from', 'markdown_github-hard_line_breaks+fancy_lists+startnum',
                        '--to', 'html',
                        '--standalone',
                        '--css', 'servalhelp.css',
                        '--variable', "pagetitle:Serval Help: ${title}",
                        '--variable', "header-includes:<meta name=\"description\" content=\"Serval App WebView Page\">",
                        '--output', dest.absolutePath,
                        src.absolutePath
                ]
            }
        }
        tasks.configureEach {
            if (name == processTaskName) {
                dependsOn pandocTaskName
            }
        }
    } else {
        println "Skipping pandoc task for ${filename} - pandoc not available"
    }
}

