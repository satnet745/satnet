def configureBuildTypeTasks = { String variantName ->
    def variantDir = variantName.toLowerCase()
    def mergeAssetsTaskName = "merge${variantName}Assets"
    def processResourcesTaskName = "process${variantName}Resources"
    def externalNativeBuildTaskName = "externalNativeBuild${variantName}"
    def assetZipTaskName = "assetZip${variantName}"
    def assetManifestTaskName = "assetManifest${variantName}"
    def assembleTaskName = "assemble${variantName}"
    def validateSigningTaskName = "validateSigning${variantName}"
    def preBuildTaskName = "pre${variantName}Build"
    def packageTaskName = "package${variantName}"
    def confType = variantDir == "release" ? project.ext.releaseType : "debug"
    def manifestId = project.findProperty("${confType}.manifest.id")
    def secret = project.findProperty("${confType}.manifest.secret")
    def author = project.findProperty("${confType}.manifest.author")
    def bk = project.findProperty("${confType}.manifest.bk")

    tasks.register(assetZipTaskName, Zip) {
        dependsOn mergeAssetsTaskName
        dependsOn externalNativeBuildTaskName
        doNotTrackState("Output directory is dynamic")
        archiveFileName = "serval.zip"
        from('src/main/servalzip/')
        nativeAbis.each { abi ->
            from("build/intermediates/ndkBuild/${variantDir}/obj/local/${abi}") {
                include "*PIE"
                exclude "**/objs-${variantDir}/**"
                into "bin/${abi}"
            }
        }
        doFirst {
            destinationDirectory = resolveOutputDirectory(mergeAssetsTaskName, "outputDir")
        }
    }

    tasks.register(assetManifestTaskName, Exec) {
        dependsOn mergeAssetsTaskName
        doNotTrackState("Output directory is dynamic")
        workingDir = 'src/main/servalzip'
        executable = 'git'
        args = ['ls-files', '-s', '.']
        doFirst {
            def outputDir = resolveOutputDirectory(mergeAssetsTaskName, "outputDir")
            standardOutput = file("${outputDir}/manifest").newOutputStream()
        }
    }

    pandocTask(variantName, "CURRENT-RELEASE.md", "Release Notes")
    pandocTask(variantName, "CREDITS.md", "Credits")
    pandocTask(variantName, "LICENSE-SOFTWARE.md", "Software License")
    pandocTask(variantName, "CC-BY-4.0.md", "Documentation License")
    pandocTask(variantName, "PRIVACY.md", "Privacy Policy")
    def manifestTaskRequested = requestedTaskNames.any {
        it.contains("manifest${variantName}".toLowerCase())
    }

    tasks.configureEach {
        if (name == processResourcesTaskName) {
            dependsOn assetZipTaskName
            dependsOn assetManifestTaskName
        }
    }

    def promptTaskName = "prompt${variantName}Pwd"
    tasks.register(promptTaskName) {
        doLast {
            if (variantDir != "debug" && releaseSigningRequired) {
                def signConfig = androidExtension.signingConfigs.findByName("release")
                if (signConfig != null && signConfig.storeFile != null && signConfig.storeFile.exists()) {
                    if (!signConfig.storePassword)
                        signConfig.storePassword = readPassword("Enter password for jar signing keystore:")
                    if (!signConfig.keyPassword)
                        signConfig.keyPassword = readPassword("Enter password for jar signing key:")
                }
            }
            if (manifestTaskRequested && keyringFile != null && author != null && entryPin == null)
                entryPin = readPassword("Enter serval keyring entry pin:")
        }
    }

    tasks.configureEach {
        if (name == validateSigningTaskName) {
            dependsOn promptTaskName
        }
        if (name == preBuildTaskName) {
            mustRunAfter promptTaskName
        }
    }

    if (manifestId && (secret || (author && keyring))) {
        def manifestTaskName = "manifest${variantName}"
        tasks.register(manifestTaskName, Exec) {
            dependsOn hostServald
            dependsOn packageTaskName
            environment SERVALINSTANCE_PATH: file('build/serval/').absolutePath
            if (keyringFile != null && author != null) {
                environment SERVALD_KEYRING_READONLY: "true"
                environment SERVALD_KEYRING_PATH: keyring
            }
            executable = hostServald.outputs.files.singleFile
            doFirst {
                def apkDir = file("${layout.buildDirectory.get().asFile}/outputs/apk/${variantDir}")
                def apkFile = fileTree(apkDir) {
                    include "*.apk"
                }.files.sort { a, b -> a.name <=> b.name }.find { it.exists() }
                if (apkFile == null) {
                    throw new GradleException("No APK found under ${apkDir} for ${variantName}")
                }
                args = ['rhizome', 'add', 'file']
                if (keyringFile != null && author != null && entryPin)
                    args += "--entry-pin=$entryPin"
                args += [
                        '--zip-comment',
                        author ?: "",
                        apkFile,
                        '',
                        secret ?: "",
                        "service=file"
                ]
                if (manifestId)
                    args += "id=$manifestId"
                if (bk)
                    args += "BK=$bk"
                args += "name=${project.ext.appName}-${project.ext.gitDescribe}.apk"
                delete(file('build/serval/'))
            }
        }

        tasks.configureEach {
            if (name == assembleTaskName) {
                dependsOn manifestTaskName
            }
        }
    }
}

afterEvaluate {
    configureBuildTypeTasks("Debug")
    configureBuildTypeTasks("Release")
}

tasks.register("productionGate") {
    group = "verification"
    description = "Runs the signed-release production readiness gate for this app module."
    dependsOn(
            "lintDebug",
            "testDebugUnitTest",
            "verifyReleaseSigningConfig",
            "writeReleaseChecksums"
    )
}

tasks.register("ciCriticalGate") {
    group = "verification"
    description = "CI-only strict lint/security regression gate (baseline-backed)."
    dependsOn("lintDebug")
}

tasks.register("verifyReleaseSigningConfig") {
    group = "verification"
    description = "Fails when required release signing inputs are missing."
    doLast {
        def missing = []
        if (configuredReleaseStoreFile == null) {
            missing << "release.key.store"
        }
        if (!configuredReleaseKeyAlias.trim()) {
            missing << "release.key.alias"
        }
        if (!configuredReleaseStorePassword.trim()) {
            missing << "release.key.store.password or BATPHONE_RELEASE_STORE_PASSWORD"
        }
        if (!configuredReleaseKeyPassword.trim()) {
            missing << "release.key.password or BATPHONE_RELEASE_KEY_PASSWORD"
        }
        if (!missing.isEmpty()) {
            throw new GradleException("Release signing is incomplete. Missing: ${missing.join(', ')}")
        }
    }
}

tasks.register("writeReleaseChecksums") {
    group = "build"
    description = "Writes SHA-256 checksums for assembled release APK artifacts."
    dependsOn("assembleRelease")
    doLast {
        def apkDir = file("${layout.buildDirectory.get().asFile}/outputs/apk/release")
        def apkFiles = fileTree(apkDir) {
            include("*.apk")
        }.files.sort { a, b -> a.name <=> b.name }
        if (apkFiles.isEmpty()) {
            throw new GradleException("No release APKs found under ${apkDir}")
        }
        def checksumDir = file("${layout.buildDirectory.get().asFile}/outputs/checksums/release")
        checksumDir.mkdirs()
        def checksumFile = new File(checksumDir, "SHA256SUMS.txt")
        checksumFile.text = apkFiles.collect { file ->
            "${sha256ForFile(file)} *${file.name}"
        }.join(System.lineSeparator()) + System.lineSeparator()
        logger.lifecycle("Release checksums written to ${checksumFile}")
    }
}

tasks.register("releaseReadinessGate") {
    group = "verification"
    description = "Strict signed-release gate including signing validation and checksum evidence."
    dependsOn(
            "productionGate"
    )
}

tasks.configureEach {
    if (name == "testDebugUnitTest") {
        mustRunAfter("lintDebug")
    }
    if (name == "verifyReleaseSigningConfig") {
        mustRunAfter("testDebugUnitTest")
    }
    if (releaseSigningRequired && (name == "preReleaseBuild" || name == "assembleRelease" || name == "bundleRelease")) {
        dependsOn("verifyReleaseSigningConfig")
    }
    if (name == "assembleRelease") {
        mustRunAfter("verifyReleaseSigningConfig")
    }
}
