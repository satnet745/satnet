android {
    namespace = 'org.servalproject'
    compileSdkVersion 34
    buildFeatures {
        buildConfig = true
        resValues = true
    }
    // Moved ndkVersion to top-level android block (AGP 8.x requires this)
    ndkVersion = "21.4.7075529"
    defaultConfig {
        applicationId "org.servalproject"
        minSdkVersion 19
        targetSdkVersion 34
        versionCode project.ext.commitCount
        versionName project.ext.gitDescribe
        buildConfigField "String", "CommitSha", ("\"" + project.ext.commitSha + "\"")
        buildConfigField "boolean", "FEATURE_LIGHTNING_ENABLED", lightningFeatureEnabled.toString()
        buildConfigField "boolean", "FEATURE_RELAY_ENABLED", relayFeatureEnabled.toString()
        buildConfigField "boolean", "FEATURE_EXPERIMENTAL_ROUTING_ENABLED", routingFeatureEnabled.toString()
        buildConfigField "boolean", "SATNET_LIVE_EXCHANGE_RATES_ENABLED", satnetLiveExchangeRatesEnabled.toString()
        buildConfigField "String", "SATNET_DEPLOYMENT_STAGE", "\"$satnetDeploymentStage\""
        buildConfigField "String", "SATNET_SETTLEMENT_NETWORK", "\"$satnetSettlementNetwork\""
        buildConfigField "String", "SATNET_RELAY_DIRECTORY_URL", "\"$satnetRelayDirectoryUrl\""
        buildConfigField "String", "SATNET_EXCHANGE_RATE_BASE_URL", "\"$satnetExchangeRateBaseUrl\""
        buildConfigField "String", "SATNET_EXCHANGE_RATE_PROVIDER_URLS", "\"$satnetExchangeRateProviderUrls\""
        buildConfigField "String", "SATNET_COMPLIANCE_PROFILE", "\"$satnetComplianceProfile\""
        buildConfigField "String", "SATNET_SUPPORT_URL", toBuildConfigString(satnetSupportUrl)
        buildConfigField "String", "SATNET_DONATION_BITCOIN_ADDRESS", toBuildConfigString(satnetDonationBitcoinAddress)
        buildConfigField "String", "SATNET_DONATION_BITCOIN_URI", toBuildConfigString(satnetDonationBitcoinUri)
        buildConfigField "boolean", "SATNET_REMOTE_KILL_SWITCH_ENABLED", satnetRemoteKillSwitchEnabled.toString()
        buildConfigField "boolean", "SATNET_AUTO_RHIZOME_APK_IMPORT_ENABLED", satnetAutoRhizomeApkImportEnabled.toString()
        buildConfigField "boolean", "SATNET_ALLOW_CUSTODIAL_MODE", satnetAllowCustodialMode.toString()
        buildConfigField "boolean", "SATNET_ALLOW_PROTOCOL_FEES", satnetAllowProtocolFees.toString()
        buildConfigField "boolean", "SATNET_ALLOW_SURVEILLANCE_MONETIZATION", satnetAllowSurveillanceMonetization.toString()
        buildConfigField "boolean", "SATNET_REQUIRE_TESTNET_BY_DEFAULT", satnetRequireTestnetByDefault.toString()
        buildConfigField "boolean", "SATNET_MAINNET_EXPLICIT_OVERRIDE", satnetMainnetExplicitOverride.toString()
        resValue "string", "version", project.ext.gitDescribe
        // ndkVersion was here previously; removed to avoid MissingPropertyException when read outside block
        externalNativeBuild {
            ndkBuild {
                abiFilters = nativeAbis
                arguments += "-j${Runtime.runtime.availableProcessors()}".toString()
            }
        }
        multiDexEnabled = true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    externalNativeBuild {
        ndkBuild {
            path = 'src/main/jni/Android.mk'
        }
    }

    signingConfigs {
        release {
            storeFile = configuredReleaseStoreFile
            // Prefer explicit CI/developer secrets when available; otherwise prompt later.
            storePassword = configuredReleaseStorePassword
            keyAlias = configuredReleaseKeyAlias
            keyPassword = configuredReleaseKeyPassword
            enableV1Signing = true
            enableV2Signing = true
        }
    }

    buildTypes {
        debug {
            def manifestId = project.findProperty("debug.manifest.id")
            buildConfigField "String", "ManifestId", "\"$manifestId\""
            // Debug builds skip minification for faster iteration
            minifyEnabled false
            shrinkResources false
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            def manifestId = project.findProperty("${project.ext.releaseType}.manifest.id")
            buildConfigField "String", "ManifestId", "\"$manifestId\""
            if (releaseSigningConfigured) {
                signingConfig signingConfigs.release
            } else if (!releaseSigningRequired) {
                println 'Unsigned release explicitly allowed for local dry run (--project-prop allow.unsigned.release=true)'
            } else {
                println 'Release signing inputs are missing during configuration; signed release tasks will fail in verifyReleaseSigningConfig until release.key.* or BATPHONE_RELEASE_* values are provided.'
            }
        }
    }

    // Split APKs by ABI to reduce individual APK size
    bundle {
        language.enableSplit = true
        density.enableSplit = true
        abi.enableSplit = true
    }


    sourceSets.main {
        java.srcDirs += 'src/main/jni/serval-dna/java-api/src'
    }
    lint {
        // Keep ad-hoc local workflows permissive, but enforce failures during ship gates.
        baseline = file("lint-baseline.xml")
        abortOnError = strictCiLint || strictReleaseGateRequested
    }

    testOptions {
        unitTests.includeAndroidResources = true
        unitTests.returnDefaultValues = true
        unitTests.all {
            maxParallelForks = configuredTestMaxParallelForks
            minHeapSize = configuredTestMinHeap
            maxHeapSize = configuredTestMaxHeap
            if (configuredTestForkEvery > 0L) {
                forkEvery = configuredTestForkEvery
            }
            jvmArgs "-XX:MaxMetaspaceSize=${configuredTestMaxMetaspace}",
                    "-XX:ActiveProcessorCount=${configuredTestActiveProcessorCount}"
            if (configuredTestUseSerialGc) {
                jvmArgs "-XX:+UseSerialGC"
            }
            if (configuredTestHeapBaseMinAddress) {
                jvmArgs "-XX:HeapBaseMinAddress=${configuredTestHeapBaseMinAddress}"
            }
            doFirst {
                def directoriesToCreate = [
                        binaryResultsDirectory.get().asFile,
                        reports.junitXml.outputLocation.get().asFile,
                        reports.html.outputLocation.get().asFile
                ].findAll { it != null }

                directoriesToCreate.each { File dir ->
                    if (!dir.exists() && !dir.mkdirs() && !dir.exists()) {
                        throw new GradleException("Unable to create test output directory ${dir} for ${path}")
                    }
                }
            }
            testLogging {
                events = [TestLogEvent.PASSED, TestLogEvent.FAILED, TestLogEvent.SKIPPED] as Set
                exceptionFormat = TestExceptionFormat.FULL
            }
        }
    }
}

