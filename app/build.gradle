ext {
    appName = "SATNET"

    // Helper: run a command, return stdout on exit 0, otherwise return the fallback.
    // This keeps builds working in shallow clones, source snapshots, and restricted CI agents.
    def safeGitExec = { List<String> cmd, File dir = null, String fallback ->
        try {
            def proc = cmd.execute(null, dir)
            proc.waitForOrKill(5000)
            proc.exitValue() == 0 ? proc.text.trim() : fallback
        } catch (Exception ignored) {
            fallback
        }
    }

    commitCount = {
        def raw = safeGitExec(["git", "rev-list", "--count", "HEAD"], null,
                System.getenv("BUILD_NUMBER") ?: "0")
        raw.isInteger() ? raw.toInteger() : 0
    }()
    gitDescribe = safeGitExec(
            ["git", "describe", "--always", "--dirty", "--tags"], null,
            System.getenv("GIT_DESCRIBE") ?: "0.0.0-unversioned")
    commitSha = safeGitExec(
            ["git", "rev-parse", "HEAD"], null,
            System.getenv("GIT_SHA") ?: "0000000000000000000000000000000000000000")
    libSodiumStatus = safeGitExec(
            ["git", "describe", "--always", "--dirty", "--tags"],
            file('src/main/jni/libsodium'), "unknown")
    cleanBuild = !gitDescribe.contains('-dirty')
    releaseType = "development"
}

