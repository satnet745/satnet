// based on https://www.timroes.de/2014/01/19/using-password-prompts-with-gradle-build-files/
def readPassword(fmt) {
    def cons = System.console()
    if (cons != null) {
        return new String(cons.readPassword("\n$fmt"))
    }
    // No console available (IDE sync etc.). Return empty to avoid UI and IDE issues.
    return ""
}

if (project.hasProperty("batphone.properties")){
    def propFile = file(project.property("batphone.properties"))
    if (propFile.exists()){
        println "Loading additional properties from $propFile"
        def props = new java.util.Properties()
        propFile.withInputStream { props.load(it) }
        for(p in props) {
            def value = p.value
            if (value.startsWith("./"))
                value = file(propFile.getParent() + "/" + value.substring(2)).absolutePath
            println "${p.key} = $value"
            project.ext[p.key] = value
        }
    }else{
        println "Skipped loading properties from $propFile"
    }
}

def loadLooseProperties = { File propertiesFile ->
    def values = [:]
    propertiesFile.eachLine('UTF-8') { String rawLine ->
        if (rawLine == null) {
            return
        }
        def trimmed = rawLine.trim()
        if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('!')) {
            return
        }
        int separatorIndex = -1
        for (int i = 0; i < rawLine.length(); i++) {
            char current = rawLine.charAt(i)
            if ((current == '=' || current == ':') && (i == 0 || rawLine.charAt(i - 1) != '\\')) {
                separatorIndex = i
                break
            }
        }
        def key = separatorIndex >= 0 ? rawLine.substring(0, separatorIndex).trim() : trimmed
        def value = separatorIndex >= 0 ? rawLine.substring(separatorIndex + 1).trim() : ""
        if (key) {
            values[key] = value
        }
    }
    values
}

