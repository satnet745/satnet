def resolveProjectOrEnvValue = { String propertyName, String envName ->
    if (project.hasProperty(propertyName)) {
        return project.property(propertyName).toString()
    }
    def envValue = System.getenv(envName)
    if (envValue != null && envValue.toString().trim()) {
        return envValue.toString()
    }
    (localReleaseSigningProps[propertyName] ?: "").toString()
}
