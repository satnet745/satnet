def readPositiveIntProperty = { String propertyName, int fallback ->
    def raw = (project.findProperty(propertyName) ?: "").toString().trim()
    if (!raw) {
        return fallback
    }
    try {
        return Math.max(1, Integer.parseInt(raw))
    } catch (NumberFormatException ignored) {
        logger.warn("Ignoring invalid ${propertyName} value '${raw}', using ${fallback}")
        return fallback
    }
}
def readNonNegativeLongProperty = { String propertyName, long fallback ->
    def raw = (project.findProperty(propertyName) ?: "").toString().trim()
    if (!raw) {
        return fallback
    }
    try {
        return Math.max(0L, Long.parseLong(raw))
    } catch (NumberFormatException ignored) {
        logger.warn("Ignoring invalid ${propertyName} value '${raw}', using ${fallback}")
        return fallback
    }
}
def readBooleanProperty = { String propertyName, boolean fallback ->
    def raw = (project.findProperty(propertyName) ?: "").toString().trim()
    return raw ? raw.toBoolean() : fallback
}
